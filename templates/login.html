<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>LabFlow - Logowanie</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(120deg, #007bff 0%, #6dd5ed 100%);
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 370px;
            margin: 100px auto;
            background: #fff;
            padding: 40px 30px 30px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 24px #007bff33;
            position: relative;
        }
        .login-container::before {
            content: "";
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px #007bff33;
            background-image: url('https://img.icons8.com/ios-filled/50/007bff/laboratory.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 48px 48px;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #007bff;
            font-weight: 700;
        }
        .error {
            color: #d00;
            text-align: center;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 18px 0;
            border: 1px solid #b3d1ff;
            border-radius: 6px;
            font-size: 16px;
            background: #f7fbff;
            transition: border 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border: 1.5px solid #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #007bff 0%, #6dd5ed 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 8px #007bff33;
            transition: background 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #0056b3 0%, #4fc3f7 100%);
        }
        .footer {
            text-align: center;
            margin-top: 18px;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>LabFlow</h2>
        {% if form.errors %}
            <div class="error">Nieprawidłowy email lub hasło.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Email" required autofocus>
            <input type="password" name="password" placeholder="Hasło" required>
            <button type="submit">Zaloguj się</button>
        </form>
        <div class="footer">&copy; JD Solutions 2026 LabFlow</div>
    </div>
</body>
</html>
